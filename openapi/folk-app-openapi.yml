          type: string
          maxLength: 255
        targetUrl:
          type: string
          format: uri
          maxLength: 2048
        subscribedEvents:
          type: array
          items:
            $ref: '#/components/schemas/WebhookSubscribedEvent'
        createdAt:
          type: string
          format: date-time
    WebhookWithSigningSecret:
      allOf:
        - $ref: '#/components/schemas/Webhook'
        - type: object
          properties:
            signingSecret:
              type: string
              description: Secret used to verify the authenticity of webhook payloads.
    WebhookInput:
      type: object
      required: [targetUrl, subscribedEvents]
      properties:
        name:
          type: string
          maxLength: 255
          example: My app integration
        targetUrl:
          type: string
          format: uri
          maxLength: 2048
          description: A publicly accessible HTTP or HTTPS URL to receive events.
          example: https://my-app.com/webhook
        subscribedEvents:
          type: array
          items:
            $ref: '#/components/schemas/WebhookSubscribedEvent'
    WebhookSubscribedEvent:
      type: object
      properties:
        eventType:
          type: string
          enum:
            - person.created
            - person.updated
            - person.deleted
            - person.groups_updated
            - person.workspace_interaction_metadata_updated
            - company.created
            - company.updated
            - company.deleted
            - company.groups_updated
            - object.created
            - object.updated
            - object.deleted
            - note.created
            - note.updated
            - note.deleted
            - reminder.created
            - reminder.updated
            - reminder.deleted
            - reminder.triggered
        filter:
          type: object
          properties:
            groupId:
              type: string
              maxLength: 255
