aid: folk-app
url: https://raw.githubusercontent.com/api-evangelist/folk-app/refs/heads/main/apis.yml
name: Folk
kind: company
description: Folk is a lightweight, relationship-focused CRM for people who build
  their business on relationships. Folk's public REST API (versioned by date, base
  https://api.folk.app/v1, Bearer API key auth) lets you programmatically manage
  people, companies, groups, deals and other custom objects, notes, reminders, and
  interactions, and subscribe to real-time changes through webhooks. API access is
  a paid-plan feature.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- CRM
- Relationships
- Contacts
- Sales
- Pipeline
- Webhooks
created: '2026-07-02'
modified: '2026-07-02'
specificationVersion: '0.19'
