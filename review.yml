aid: folk-app
name: Folk
review:
  question: Does Folk expose a documented public WebSocket API?
  answer: false
  date: '2026-07-02'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Folk's public real-time surface is
    outbound webhooks (HTTP POST from Folk to a subscriber-provided targetUrl),
    not a server-push transport that Folk hosts. There is no WebSocket or SSE
    endpoint on Folk's own API to model. The webhook event catalog is captured
    in the OpenAPI document (the /v1/webhooks operations and the
    subscribedEvents enum), which is the appropriate place for a
    subscriber-registers-a-URL webhook model; an AsyncAPI document describing a
    Folk-hosted channel would misrepresent the transport.
findings:
  summary: |
    Folk does not publish a documented public WebSocket API. Folk is a
    lightweight, relationship-focused CRM. Its public "Folk External API" is a
    date-versioned REST API (base https://api.folk.app, resources under /v1),
    authenticated with a Bearer API key created in workspace settings; API
    access is a paid-plan (Premium / Enterprise) feature. The API is pure
    request/response REST over HTTPS covering people, companies, groups, deals
    and other group-scoped custom objects, notes, reminders, interactions,
    users, and webhooks. Folk's real-time mechanism is outbound webhooks: a
    client registers a publicly reachable targetUrl and subscribes to change
    events (person / company / object / note / reminder created, updated,
    deleted, plus reminder.triggered and person/company groups_updated), and
    Folk POSTs signed event payloads to that URL. No realtime, bidirectional, or
    streaming WebSocket (ws:// or wss://) endpoint is documented anywhere in
    Folk's developer documentation or its published OpenAPI schema.
  publicApi: |
    Yes - a real, documented public REST API exists. Folk publishes an OpenAPI
    3.1 schema at https://developer.folk.app/schemas/2025-06-09.json (the
    version is a date, 2025-06-09) and a hosted reference at
    https://developer.folk.app. The surface is small but genuine: 39 documented
    operations across 9 resource areas. API access requires a paid Folk plan
    (Premium or Enterprise); the api.folk.app host returns 401 without a Bearer
    key.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.folk.app/v1
      documented: true
      note: Date-versioned request/response REST. Bearer API key auth. Cursor pagination with X-RateLimit-* headers.
    - protocol: Webhook
      scheme: https
      documented: true
      note: >-
        Outbound HTTP POST from Folk to a subscriber-registered targetUrl, with a
        signing secret for verification. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Folk's API reference or OpenAPI schema as of the review date.
