sources:
  - url: https://developer.folk.app
    type: Documentation
    note: Developer home - Quickstart, Core Concepts, API Reference, Changelog. No WebSocket mentioned.
  - url: https://developer.folk.app/llms.txt
    type: Documentation
    note: Machine-readable documentation index listing all reference sections.
  - url: https://developer.folk.app/schemas/2025-06-09.json
    type: OpenAPI
    note: Published OpenAPI 3.1 schema (Folk External API, version 2025-06-09). Server https://api.folk.app; Bearer auth; all operations REST.
  - url: https://developer.folk.app/api-reference/authentication
    type: Documentation
    note: 'Bearer API key auth (Authorization: Bearer <api_key>); keys created in workspace settings; 401 without auth.'
  - url: https://developer.folk.app/api-reference/webhooks
    type: APIReference
    note: Webhook CRUD plus subscribedEvents enum and signing secret. Outbound HTTP POST, not WebSocket.
  - url: https://www.folk.app/pricing
    type: Documentation
    note: Per-seat Standard / Premium / Enterprise tiers; REST API access requires Premium or Enterprise.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Folk's own public API is
    request/response REST plus an outbound webhook mechanism (subscriber
    registers a targetUrl; Folk POSTs signed events). No AsyncAPI document was
    created because there is no Folk-hosted server-push channel (WebSocket or
    SSE) to model; the webhook subscription surface is captured in the OpenAPI
    document instead.
